<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/Logo-ICON-128.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/fonts/fonts.css" />
    <title>BitFun - AI Code Assistant</title>
    <script>
      (function () {
        var dark = '#121214';
        /* Keep in sync with presets/light-theme.ts colors.background.primary */
        var light = '#f3f3f5';
        var m = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)');
        var root = document.documentElement;
        var bg = root.style.backgroundColor || (m && m.matches ? dark : light);
        root.style.setProperty('--bitfun-startup-bg', bg);
        root.style.backgroundColor = bg;
        function paintBody() {
          if (document.body) document.body.style.backgroundColor = bg;
        }
        paintBody();
        if (document.readyState === 'loading') {
          document.addEventListener('DOMContentLoaded', paintBody);
        } else {
          paintBody();
        }
      })();
    </script>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html, body {
        width: 100%;
        height: 100%;
        overflow: hidden;
      }
      
      /* Fallback before inline script runs; align with dark / light theme primaries */
      html {
        background-color: #121214;
      }
      @media (prefers-color-scheme: light) {
        html {
          background-color: #f3f3f5;
        }
      }
      
      body {
        background-color: inherit;
      }

      #root {
        width: 100%;
        height: 100%;
      }

      .bitfun-preload {
        width: 100%;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        background: var(--bitfun-startup-bg, inherit);
      }

      .bitfun-preload__logo {
        display: block;
        width: 96px;
        height: 96px;
        border-radius: 12px;
        user-select: none;
        -webkit-user-select: none;
      }
    </style>
  </head>

  <body>
    <script type="module" src="/src/main.tsx"></script>
    <div id="root">
      <div class="bitfun-preload" aria-hidden="true">
        <img
          src="/Logo-ICON-128.png"
          alt=""
          class="bitfun-preload__logo"
          draggable="false"
          decoding="async"
          fetchpriority="low"
        />
      </div>
    </div>
  </body>
</html>
